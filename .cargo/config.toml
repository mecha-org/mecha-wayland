[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
# Satisfy gbm-sys's #[link(name = "gbm")] — libgbm.so lives here in the
# cross Docker sysroot after `apt install libgbm-dev:arm64`.
# On the host this path doesn't exist; ld silently ignores missing -L paths.
rustflags = ["-L", "/usr/lib/aarch64-linux-gnu"]
