[workspace]
members = [
    "crates/renderer",
    "crates/app",
    "crates/assets",
    "crates/counter",
]
default-members = ["crates/counter"]
resolver = "2"

[workspace.dependencies]
# async / io
io-uring = "0.7"
nix = { version = "0.31", features = ["socket", "uio"] }
libc = "0.2"

# tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# error handling
anyhow = "1"

# image decoding
png = "0.18"

# codegen (build-dep only)
quick-xml = { version = "0.39", features = ["serialize"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
crunch = "0.5"

# graphics
khronos-egl = { version = "6", features = ["dynamic"] }
glow = "0.17"

# renderer extras
bytemuck = { version = "1", features = ["derive"] }
fontdue = "0.9"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
